name: Autoformat with Ruff

on:
    pull_request:
        types: [opened, synchronize]
    workflow_dispatch:

jobs:
    format:
        runs-on: ubuntu-latest
        if: |
            github.event.pull_request.head.repo.full_name == github.repository &&
            github.actor != 'renovate[bot]'
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  ref: ${{ github.head_ref }}

            - name: Set up Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
              with:
                  python-version: "3.13"

            - name: Install ruff
              run: pip install -U ruff==0.15.12

            - name: Run ruff format
              run: ruff format . --exclude docs/

            - name: Run ruff lint fixes
              run: ruff check --fix . --exclude docs/

            - name: Commit and push changes
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A

                  if ! git diff --cached --quiet; then
                    git commit -m "format(ruff) [ci skip]"
                    git show HEAD
                    git push
                  else
                    echo "No changes required"
                  fi

    lint-check:
        runs-on: ubuntu-latest
        if: |
            github.event.pull_request.head.repo.full_name != github.repository &&
            github.actor != 'renovate[bot]'

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Set up Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
              with:
                  python-version: "3.13"

            - name: Install ruff
              run: pip install ruff

            - name: Check ruff formatting
              run: ruff format --check . --exclude docs/

            - name: Check ruff lint
              run: ruff check . --exclude docs/
